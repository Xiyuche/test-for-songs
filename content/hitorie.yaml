version: 1
pack:
  id: hitorie-jp-top10-2026-04-18
  artist:
    name_ja: "ヒトリエ"
    name_latn: "hitorie"
  locale: "zh-CN"
  output_language: "zh-CN"
  observed_at: "2026-04-18"
  intent: >-
    第一份 content-pack-driven 的 Hitorie 测试内容包。它把题面、文案、歌曲画像、
    排名决策和证据放在同一个 YAML 里，后续如果要重做题库、换 UI 语气、或更新排行榜，
    优先改这里，不要先改代码常量。

lyric_policy:
  store_full_lyrics: false
  allowed_storage:
    - "歌词页链接"
    - "不超过一句的主题概述"
    - "必要时极短的关键词级摘记"
  note: >-
    本包不落库完整歌词，不复制大段歌词文本；只保存链接、主题说明、以及用于溯源的简短证据注记。

editable_text:
  pack_title: "Hitorie Top Songs Resonance Pack"
  pack_subtitle: "不是猜你最常单曲循环哪首，而是看你最近像哪一种失真、推力和开口方式。"
  result_prefix: "你命中的不是播放量最高的一首，是今天最像你的那种响法。"
  result_suffix: "如果你最近的状态变了，命中的歌也会变；歌单像天气，不像身份证。"
  ranking_badge: "Apple Music Japan Top Songs"
  source_badge: "证据已内嵌"
  lyric_badge: "只存链接，不存整段歌词"

voice_guide:
  core_brief: >-
    语气要像真的听过这十首歌，不像在给“日系摇滚人格测试”套模板。允许锋利、允许偏执、
    允许一点夜里走路才会冒出来的句子，但不要端着。
  do:
    - "优先写动作和触感：抬头、拧开、冲出去、卡住、失真、发亮、踩空。"
    - "允许句子短一点，像鼓点切分，不必每段都写成完整心理咨询总结。"
    - "如果要写温柔，写成有成本的温柔，不要写成空气净化器式安慰。"
    - "如果要写痛感，落到具体反应，不要只说“破碎”“宿命”“救赎”。"
    - "保留 Hitorie 的速度感、噪点和舞台感，少写抽象形容词堆叠。"
  avoid:
    - "避免把每首歌都写成“成长”“治愈”“拥抱脆弱”的同一种话术。"
    - "避免把 wowaka / シノダ 的词都抹平成泛情绪文案。"
    - "避免把动漫 tie-in 当成唯一解释；可以记，但不能盖过歌本身。"
    - "避免把粉丝评论直接当结论，评论只能做旁证。"
  one_line_test: "删掉歌名后，这段话还应该只像这一首，不像任何一首都能套。"

ui_copy:
  landing:
    eyebrow: "Hitorie Resonance Test"
    title: "你会被哪首ヒトリエ顶到胸口"
    subtitle: >-
      30 道题，5 条主轴，结果落到 Apple Music Japan 当前 Top Songs 里的 10 首歌。
      排名是热门度，命中是你最近的反应方式；两者不是一回事。
    primary_cta: "开始测"
    secondary_cta: "先看来源"
    ranking_note: "排行榜固定取 2026-04-18 的 Apple Music 日本区艺术家页 Top Songs。"
  question_flow:
    progress_label: "正在拆你的歌词反应方式"
    likert_hint: "别选理想状态，选你最近更常发生的那种。"
    back_button: "上一题"
    next_button: "下一题"
    submit_button: "看结果"
  result_page:
    title_template: "你更像《{title}》"
    resonance_label: "共振度"
    stability_label: "稳定度"
    radar_title: "五维歌词气候"
    evidence_title: "为什么是这首"
    secondary_title: "接近命中的另外两首"
    retake_button: "重新测"
    share_button: "生成分享语"
    sources_note: "结果页可以展示证据摘要，但歌词只展示主题说明和外链。"
  source_panel:
    title: "来源与证据"
    ranking_label: "排名来源"
    lyric_label: "歌词来源"
    comments_label: "评论旁证"
    storefront_warning: "Apple Music 热门歌曲会随 storefront 和时间变化，请保留日期与地区。"

likert_labels:
  - "很不像我"
  - "不太像我"
  - "一半一半"
  - "挺像我"
  - "非常像我"

dimensions:
  - id: "spark"
    name: "点燃 / 定影"
    short_name: "点燃"
    description: "你更常靠先动起来把自己点着，还是先把情绪和局面定住再行动。"
    positive_label: "点燃"
    negative_label: "定影"
    positive_hint: "先冲出一点火，再决定这场火值不值得续。"
    negative_hint: "先看清轮廓，再决定要不要让自己烧起来。"
  - id: "distance"
    name: "开门 / 封存"
    short_name: "开门"
    description: "你会主动把内里递出去一点，还是把最要命的部分留在自己手里。"
    positive_label: "开门"
    negative_label: "封存"
    positive_hint: "靠近别人时，愿意先给出一点真东西。"
    negative_hint: "真正重要的那层，通常会被你锁得很深。"
  - id: "focus"
    name: "幻视 / 实感"
    short_name: "幻视"
    description: "你更容易被画面、预感、失真感牵引，还是更信已经落地的事实和代价。"
    positive_label: "幻视"
    negative_label: "实感"
    positive_hint: "会被还没说清的东西持续拉住。"
    negative_hint: "更在乎能被碰到、被证明、会留下伤口的部分。"
  - id: "stance"
    name: "硬骨 / 柔光"
    short_name: "硬骨"
    description: "碰到摩擦时，你更想顶住自己的棱角，还是用更柔的姿态把事和人护过去。"
    positive_label: "硬骨"
    negative_label: "柔光"
    positive_hint: "宁愿有冲突，也不想太快把自己磨平。"
    negative_hint: "知道什么时候该软一点，才能让重要的东西活下来。"
  - id: "recovery"
    name: "索求 / 漂移"
    short_name: "索求"
    description: "你会直接承认自己想要什么，还是习惯在关系和状态变重前先飘开一点。"
    positive_label: "索求"
    negative_label: "漂移"
    positive_hint: "想要的时候，不太擅长装无所谓。"
    negative_hint: "一旦太沉，就会本能地给自己留退路。"

questions:
  - id: "q01"
    dimension: "spark"
    direction: 1
    prompt: "当一个念头同时让我兴奋又有点没底时，我通常还是会先试一小步。"
  - id: "q02"
    dimension: "spark"
    direction: -1
    prompt: "如果一件事的边界还没看清，我宁愿先按住自己，不想靠热情冒进。"
  - id: "q03"
    dimension: "spark"
    direction: 1
    prompt: "比起把方案磨到稳妥，我更常在做的过程中才知道自己真正站哪边。"
  - id: "q04"
    dimension: "spark"
    direction: -1
    prompt: "一旦现场开始失控，我首先会想把节奏拉回来，而不是顺势加码。"
  - id: "q05"
    dimension: "spark"
    direction: 1
    prompt: "有时只有把自己丢进局里，我才分得清那到底是冲动还是认真。"
  - id: "q06"
    dimension: "spark"
    direction: -1
    prompt: "哪怕当下很上头，只要它会打乱后面的安排，我通常还是会收住。"
  - id: "q07"
    dimension: "distance"
    direction: 1
    prompt: "状态差的时候，我更怕一直闷着，所以宁愿冒点暴露的风险也会找人说。"
  - id: "q08"
    dimension: "distance"
    direction: -1
    prompt: "就算关系很近，我也会把最要命的那层留到最后，不轻易递出去。"
  - id: "q09"
    dimension: "distance"
    direction: 1
    prompt: "如果我觉得一段关系值得继续，我通常会先给一点真实反应，而不是等对方全交底。"
  - id: "q10"
    dimension: "distance"
    direction: -1
    prompt: "很多话我不是没有，只是更想自己消化完，再决定有没有必要说出来。"
  - id: "q11"
    dimension: "distance"
    direction: 1
    prompt: "如果我真的想被理解，被误解的风险通常拦不住我开口。"
  - id: "q12"
    dimension: "distance"
    direction: -1
    prompt: "我常常宁可让别人觉得我还好，也不想把关键那句直接交出去。"
  - id: "q13"
    dimension: "focus"
    direction: 1
    prompt: "做决定时，我很难只看证据；那种说不清的气味和预感也会算数。"
  - id: "q14"
    dimension: "focus"
    direction: -1
    prompt: "如果一件事没有明确落点，再动人的氛围也很难让我长期相信。"
  - id: "q15"
    dimension: "focus"
    direction: 1
    prompt: "比起别人已经说出口的话，我更容易被那些没讲明的暗示和画面勾住。"
  - id: "q16"
    dimension: "focus"
    direction: -1
    prompt: "我能欣赏暧昧感，但真要投入时间和感情，我还是要看到它落地。"
  - id: "q17"
    dimension: "focus"
    direction: 1
    prompt: "有些东西越是模糊、失真、说不清，我反而越会一直惦记。"
  - id: "q18"
    dimension: "focus"
    direction: -1
    prompt: "最后真正能说服我的，通常不是感觉对了，而是代价和结果都摆在那儿。"
  - id: "q19"
    dimension: "stance"
    direction: 1
    prompt: "当大家都默认同一种做法时，我会本能地去找那个不太顺眼但更像我的选项。"
  - id: "q20"
    dimension: "stance"
    direction: -1
    prompt: "哪怕心里有点别扭，只要配合能把事推进，我通常不会急着把态度顶到前面。"
  - id: "q21"
    dimension: "stance"
    direction: 1
    prompt: "如果某套规则让我越来越不像自己，我多半会去拧它，哪怕气氛会变难看。"
  - id: "q22"
    dimension: "stance"
    direction: -1
    prompt: "很多场合里，我宁愿先借力转弯，也不想每次都把冲突打到明面上。"
  - id: "q23"
    dimension: "stance"
    direction: 1
    prompt: "我会为了保住自己的棱角接受一点摩擦，不太擅长把自己磨成谁都好用的样子。"
  - id: "q24"
    dimension: "stance"
    direction: -1
    prompt: "对我来说，保留回旋空间往往比当场把立场钉死更重要。"
  - id: "q25"
    dimension: "recovery"
    direction: 1
    prompt: "一旦我真的想要某样东西，装得云淡风轻通常只会让我更难受。"
  - id: "q26"
    dimension: "recovery"
    direction: -1
    prompt: "当一段关系或目标开始变重，我的第一反应常常不是抓紧，而是先往后退半步。"
  - id: "q27"
    dimension: "recovery"
    direction: 1
    prompt: "比起把渴望藏好，我更倾向于承认它，哪怕这样显得不够体面。"
  - id: "q28"
    dimension: "recovery"
    direction: -1
    prompt: "很多时候我会故意给自己留出口，因为一旦被钉住，我反而开始想逃。"
  - id: "q29"
    dimension: "recovery"
    direction: 1
    prompt: "如果我在意一段连接，我会忍不住去确认它是不是还在，不太能完全装作没事。"
  - id: "q30"
    dimension: "recovery"
    direction: -1
    prompt: "事情一旦逼近“要不要定义一下”的时刻，我经常会突然更想保持流动。"

