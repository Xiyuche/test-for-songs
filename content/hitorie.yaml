    content:
      epithet: "把过载的爱和噪声一起唱穿的人"
      summary: >-
        你不是安静地相信爱，你是那种明知道话会失真、气会不够、句子会把自己逼到极限，
        还是要把心里的东西一次唱到亮的人。你很少温吞地喜欢，通常是一头扎进去。
      scene: >-
        像舞台灯刚打下来，喉咙还没热开，心里那句最危险的话已经先冲出去了；
        你甚至来不及整理，就已经在声音里暴露了自己。
      gift: "你能把混乱、爱意和表达欲拧成推进力，情绪越满，反而越接近真话。"
      shadow: "容易把“必须说出来”当成唯一出口，忘了自己也会因为过载而塌电。"
      ritual: "把你最近最想说的一句话写成 12 个字以内，只保留最会发光的那一截。"
